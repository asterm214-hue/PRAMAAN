<!DOCTYPE html>
<html>
<head>
    <title>Primary Victim Statement</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; }
        .header { text-align: center; border-bottom: 2px solid #000; padding-bottom: 20px; }
        .content { line-height: 1.6; }
    </style>
</head>
<body>
    <div class="header">
        <h1>Primary Victim Statement</h1>
        <p>Date: {{ date }}</p>
    </div>
    <div class="content">
        <p>I, {{ name }}, hereby state:</p>
        <p>{{ content }}</p>
        <p>Signature: ________________ Date: {{ date }}</p>
    </div>
</body>
</html>
